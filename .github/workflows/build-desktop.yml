name: Release Desktop App

# Triggers a signed Mac build whenever a `v*` tag is pushed.
# Tagging convention: vMAJOR.MINOR.PATCH (e.g. v1.0.1, v1.0.2, v1.1.0).
# The Tauri updater plugin in the installed app polls the GitHub Releases
# `latest` URL and prompts the user when a newer signed binary appears.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # manual trigger kept for emergency rebuilds

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    name: Mac (Apple Silicon, signed)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        working-directory: apps/admin-dashboard
        run: npm ci

      # Strip any whitespace / trailing newlines from the signing key secret.
      # GitHub's web UI sometimes includes a trailing newline when pasting
      # base64 strings, which the rsign base64 decoder rejects with
      # "Invalid symbol 10, offset N". This step makes the workflow
      # tolerant of pasted-with-newline secrets.
      - name: Sanitize signing key (strip whitespace)
        shell: bash
        run: |
          SANITIZED=$(printf '%s' "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" | tr -d '[:space:]')
          echo "::add-mask::$SANITIZED"
          echo "TAURI_SIGNING_PRIVATE_KEY=$SANITIZED" >> "$GITHUB_ENV"

      - name: Build + sign + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TAURI_SIGNING_PRIVATE_KEY is set by the previous step (sanitized).
          # Public key is embedded in tauri.conf.json (plugins.updater.pubkey).
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/admin-dashboard
          # Use the pushed git tag verbatim — must be in vMAJOR.MINOR.PATCH form
          # for tauri's updater to compare versions correctly.
          tagName: ${{ github.ref_name }}
          releaseName: 'VIP Agent ${{ github.ref_name }}'
          releaseBody: |
            ## VIP Agent Desktop — ${{ github.ref_name }}

            **For Mac (Apple Silicon — M1/M2/M3/M4)**

            Existing users: app shows an update prompt — click **Update now**, that's it.
            New users: download the `.dmg` below → drag to Applications → first launch may show a "developer cannot be verified" warning, right-click the app → **Open** → confirm. Future launches and updates work without prompts.

            See `Daily_changes.md` for what changed in this release.
          releaseDraft: false
          prerelease: false
          # Critical flag: emits latest.json (the manifest the updater plugin reads).
          # Without this the auto-update never fires.
          includeUpdaterJson: true
          args: --target aarch64-apple-darwin
