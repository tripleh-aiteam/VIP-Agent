name: Build Desktop App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    name: Windows (.exe)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: apps/admin-dashboard
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/admin-dashboard
          tagName: vip-agent-v1.0.${{ github.run_number }}
          releaseName: 'VIP Agent v1.0.${{ github.run_number }}'
          releaseBody: 'Download VIP Agent desktop app — Windows version.'
          releaseDraft: false
          prerelease: false
