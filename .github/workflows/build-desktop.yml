name: Build Desktop App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    name: Windows (.exe)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate updater keys if not set
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "No signing key set — updater signatures will be skipped"
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Install frontend dependencies
        working-directory: apps/admin-dashboard
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/admin-dashboard
          tagName: vip-agent-v1.0.${{ github.run_number }}
          releaseName: 'VIP Agent v1.0.${{ github.run_number }}'
          releaseBody: |
            ## VIP Agent Desktop App

            **Auto-update enabled** — if you have a previous version installed, it will update automatically.

            ### Download:
            - **Windows**: Download the `.exe` file below and run it
          releaseDraft: false
          prerelease: false
