<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VIP Agent</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .c { text-align: center; }
    h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 12px; }
    p { font-size: 13px; color: #94a3b8; margin-bottom: 20px; }
    a { display: inline-block; padding: 12px 32px; background: #1a1a2e; color: white; text-decoration: none; border-radius: 12px; font-size: 14px; font-weight: 600; }
    a:hover { background: #2d2d4e; }
    .s { width: 24px; height: 24px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="c">
    <div class="s"></div>
    <h1>VIP AGENT</h1>
    <p>Loading platform...</p>
    <a href="https://oasisvip.vercel.app">Open VIP Agent</a>
  </div>
</body>
</html>
